error.repository.author.create-failed=\u8457\u8005\u306E\u4F5C\u6210\u306B\u5931\u6557\u3057\u307E\u3057\u305F
error.repository.author.retrieve-failed=\u4F5C\u6210\u3055\u308C\u305F\u8457\u8005\u306E\u53D6\u5F97\u306B\u5931\u6557\u3057\u307E\u3057\u305F
error.repository.book.create-failed=\u66F8\u7C4D\u306E\u4F5C\u6210\u306B\u5931\u6557\u3057\u307E\u3057\u305F
