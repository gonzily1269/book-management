spring.application.name=book-management
# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=myuser
spring.datasource.password=secret
# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
# jOOQ Configuration
spring.jooq.sql-dialect=postgres
# \u30D0\u30EA\u30C7\u30FC\u30B7\u30E7\u30F3\u30A8\u30E9\u30FC\u30E1\u30C3\u30BB\u30FC\u30B8
validation.author.id.not-null=\u8457\u8005ID\u306F\u5FC5\u9808\u3067\u3059
validation.author.name.not-blank=\u8457\u8005\u540D\u306F\u5FC5\u9808\u3067\u3059
validation.author.birthDate.not-null=\u751F\u5E74\u6708\u65E5\u306F\u5FC5\u9808\u3067\u3059
validation.author.birthDate.past-or-present=\u751F\u5E74\u6708\u65E5\u306F\u73FE\u5728\u65E5\u4EE5\u524D\u3067\u3042\u308B\u5FC5\u8981\u304C\u3042\u308A\u307E\u3059
validation.book.title.not-blank=\u66F8\u7C4D\u306E\u30BF\u30A4\u30C8\u30EB\u306F\u5FC5\u9808\u3067\u3059
validation.book.price.min=\u4FA1\u683C\u306F0\u4EE5\u4E0A\u3067\u3042\u308B\u5FC5\u8981\u304C\u3042\u308A\u307E\u3059
validation.book.publicationStatus.pattern=\u51FA\u7248\u72B6\u6CC1\u306F '\u672A\u51FA\u7248' \u307E\u305F\u306F '\u51FA\u7248\u6E08\u307F' \u3067\u3042\u308B\u5FC5\u8981\u304C\u3042\u308A\u307E\u3059
validation.book.authorIds.not-empty=\u6700\u4F4E1\u4EBA\u4EE5\u4E0A\u306E\u8457\u8005\u304C\u5FC5\u9808\u3067\u3059
# \u30D3\u30B8\u30CD\u30B9\u30ED\u30B8\u30C3\u30AF\u30A8\u30E9\u30FC\u30E1\u30C3\u30BB\u30FC\u30B8
error.book.published-cannot-unpublish=\u51FA\u7248\u6E08\u307F\u306E\u66F8\u7C4D\u306F\u672A\u51FA\u7248\u72B6\u614B\u306B\u5909\u66F4\u3059\u308B\u3053\u3068\u306F\u3067\u304D\u307E\u305B\u3093
error.book.not-found=\u6307\u5B9A\u3055\u308C\u305F\u66F8\u7C4D\u304C\u898B\u3064\u304B\u308A\u307E\u305B\u3093
error.book.author-not-found=\u6307\u5B9A\u3055\u308C\u305F\u8457\u8005\u304C\u898B\u3064\u304B\u308A\u307E\u305B\u3093
error.author.not-found=\u6307\u5B9A\u3055\u308C\u305F\u8457\u8005\u304C\u898B\u3064\u304B\u308A\u307E\u305B\u3093
error.invalid-request=\u4E0D\u6B63\u306A\u30EA\u30AF\u30A8\u30B9\u30C8\u3067\u3059
error.internal-server=\u4E88\u671F\u3057\u306A\u3044\u30A8\u30E9\u30FC\u304C\u767A\u751F\u3057\u307E\u3057\u305F
error.not-found=\u30EA\u30BD\u30FC\u30B9\u304C\u898B\u3064\u304B\u308A\u307E\u305B\u3093
